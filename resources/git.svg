<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>CodeTrace Git</title>

  <!-- Vertical branch -->
  <path
    d="M8 7V17"
    stroke="currentColor"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Horizontal branch to the right -->
  <path
    d="M8 12H14"
    stroke="currentColor"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Top commit node -->
  <circle cx="8" cy="5" r="2.2" fill="currentColor" />

  <!-- Bottom commit node -->
  <circle cx="8" cy="19" r="2.2" fill="currentColor" />

  <!-- Right commit node -->
  <circle cx="17" cy="12" r="2.2" fill="currentColor" />
</svg>
